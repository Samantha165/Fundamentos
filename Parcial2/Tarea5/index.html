<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos JS</title>


<style>

    .container{
    display: flex;
    flex-wrap: wrap;

    gap: 5px;
    }

    .element{
    width: 200px;
    height: 200px;
    text-align: center;
    font-weight: bold;
    }

    .imagen{
        width: 100%;
        height: 100%;
    }

</style>


</head>



<body onload="cargar()">

    <button onclick="crearElemento()">Agregar elemento</button>

    <br>

    <div class="container">



    </div>

<script>

    const container = document.querySelector(".container");
    const input = document.querySelector("#Texto");
    let counter = 0;
    let personajes;


    function crearElemento(){

    const element = document.createElement("div");
    const imagen = document.createElement("img");

    imagen.src = personajes[counter].image;
    element.textContent = personajes[counter].name;
    
    element.classList.add("element");
    imagen.classList.add("imagen");
    element.appendChild(imagen);
    container.appendChild(element);
    
    counter++;
    }



    async function cargar(){
      
        const result = await fetch("https://rickandmortyapi.com/api/character")
            .then(response => response.json())
        
        personajes = result.results;

    }

</script>



</body>
</html>
