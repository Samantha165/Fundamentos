<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<header>
  <nav>
    <a href="./Inicio_Sesion.html" class="login">Iniciar sesión</a>
    <div class="nav_links">
      <a href="./index.html">Home</a>
      <a href="./membresias.html">Membresías</a>
      <a href="./registro.html">Registro</a>
    </div>
     <button class = "menu-toggle" onclick="toogle()">☰</button>
  </nav>
  <div class="red-bar"></div>
</header>


<script src = "./script.js"></script>
<div class="main">

  <div class="Texto_Arriba">
    <h1>Regístrate</h1>
    <h2>Queremos que formes parte de esta comunidad</h2>
  </div>

  <form action="">

  <div class="Contenedor_Registro">

    <div class="Tarjeta_Registro">
      <h3>Datos personales</h3>

      <div class="Input">
        <label for="nombre">Nombre(s)</label>
        <input type="text" id="nombre" placeholder="Juan" required>
      </div>

      <div class="Input">
        <label for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" placeholder="Pérez" required>
      </div>

      <div class="Input">
        <label for="fecha">Fecha de nacimiento</label>
        <input type="date" id="fecha" required>
      </div>

      <div class="Input">
        <label for="tel">Teléfono</label>
        <input type="tel" id="tel" placeholder="333-456-7211" required>
      </div>

      <div class="Input">
        <label for="correo">Correo</label>
        <input type="email" id="correo" placeholder="Ejemplo@correo.com" required>
      </div>

      <div class="Input">
        <label for="pass">Contraseña</label>
        <input type="password" id="pass" minlength="8" required>
      </div>

      <div class="Input">
        <label for="pass2">Confirmación de contraseña</label>
        <input type="password" id="pass2"  minlength="8" required>
      </div>
    </div>

    <div class="Columna_Derecha">

      <div class="Tarjeta_Registro">
        <h3>Datos de tu contacto de emergencia</h3>

        <div class="Input">
          <label for="nom_em">Nombre(s)</label>
          <input type="text" id="nom_em" placeholder="Ana" required>
        </div>

        <div class="Input">
          <label for="ap_em">Apellidos</label>
          <input type="text" id="ap_em" placeholder="Martínez" required>
        </div>

        <div class="Input">
          <label for="tel_em">Teléfono</label>
          <input type="tel" id="tel_em" placeholder="333-456-7223" required>
        </div>
      </div>

      <button id="Registro" onclick="veficarContraseña()">Registrarme</button>

    </div>

  </div>
</form>
</div>
 <script src = "./script.js"></script>
</body>
</html>
