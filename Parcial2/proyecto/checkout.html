<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<header>

  <nav>

     <a href="./Inicio_Sesion.html" class="login">Iniciar sesión</a>

    <div class="nav_links">
      <a href="./index.html">Home</a>
      <a href="./membresias.html">Membresías</a>
      <a href="./registro.html">Registro</a>
    </div>

     <button class = "menu-toggle" onclick="toogle()">☰</button>
  </nav>

  <div class="red-bar"></div>
</header>
<script src = "./script.js"></script>

<div class="main">

  <div class="Texto_Arriba">
    <h1>Checkout</h1>
  </div>

  <div class="Contenedor_Checkout">

    <div class="Tarjeta_Resumen">
      <h3>Resumen de compra</h3>
      <div class="Fila_Resumen">
        <span class="Nombre_Membresia">Membresía Diamante</span>
        <span class="Precio_Membresia">$700.00 MXN</span>
      </div>
      <hr class="Divisor">
      <div class="Fila_Resumen Total">
        <span>Total</span>
        <span>$700.00 MXN</span>
      </div>
    </div>

    
    <div class="Tarjeta_Pago">
      <h3>Datos de pago</h3>
<form onsubmit="">

  <div class="Input_Checkout">
    <label for="titular">Titular de la tarjeta</label>
    <input type="text" id="titular" placeholder="Como aparece en la tarjeta" required>
  </div>
<br>

  <div class="Input_Checkout">
    <label for="numero">Número de tarjeta</label>
    <input type="text" id="numero" placeholder="1234 5678 9012 3456" maxlength="19" minlength="19">
  </div>

  <br>

  <div class="Fila_Inputs">
    <div class="Input_Checkout">
      <label for="fecha">Fecha de vencimiento</label>
      <input type="text" id="fecha" placeholder="MM/AA" maxlength="5" minlength="5" required pattern="[0-9]{2}/[0-9]{2}">
    </div>

<br>

    <div class="Input_Checkout">
      <label for="cvv">CVV</label>
      <input type="text" id="cvv" placeholder="***" maxlength="3" minlength="3" required pattern="[0-9]{3}">
    </div>
  </div>
<br>
  <button type="submit" id="IS">Pagar ahora</button>

</form>


    </div>

  </div>

</div>

 <script src = "./script.js"></script>
</body>
</html>
